name: Tests

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "**"

jobs:
  python:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Use Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          cache: "pip"
          python-version: ${{ matrix.python-version }}

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --upgrade-strategy eager -r test-requirements.txt -e .

      - name: Run unit tests
        run: |
          pytest tests/unit/ --cov toggl

      - name: Run integration tests
        if: env.TOGGL_API_TOKEN != ''
        env:
          TOGGL_API_TOKEN: ${{ secrets.TOGGL_API_TOKEN }}
          TOGGL_API_URL: ${{ secrets.TOGGL_API_URL }}
          TOGGL_REPORTS_URL: ${{ secrets.TOGGL_REPORTS_URL }}
        run: |
          pytest tests/integration/ --cov toggl --cov-append
