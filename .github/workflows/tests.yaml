name: Tests

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "**"

jobs:
  python:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Use Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          cache: "pip"
          python-version: ${{ matrix.python-version }}

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --upgrade-strategy eager -r test-requirements.txt -e .

      - name: Run unit tests
        env:
          TOGGL_API_TOKEN: ${{ secrets.TOGGL_API_TOKEN }}
          TOGGL_API_URL: ${{ secrets.TOGGL_API_URL }}
          TOGGL_REPORTS_URL: ${{ secrets.TOGGL_REPORTS_URL }}
        run: |
          pytest tests/unit/ --cov toggl

      - name: Debug API config
        env:
          TOGGL_API_URL: ${{ secrets.TOGGL_API_URL }}
          TOGGL_API_TOKEN: ${{ secrets.TOGGL_API_TOKEN }}
        run: |
          python -c "
          import os
          url = os.environ.get('TOGGL_API_URL', 'NOT SET')
          token = os.environ.get('TOGGL_API_TOKEN', 'NOT SET')
          print(f'TOGGL_API_URL length: {len(url)}, starts with: {url[:30] if url != \"NOT SET\" else \"N/A\"}...')
          print(f'TOGGL_API_TOKEN length: {len(token)}')
          from toggl.toggl import TOGGL_URL
          print(f'Resolved TOGGL_URL: {TOGGL_URL}')
          import requests
          resp = requests.get(TOGGL_URL + '/me', auth=(token, 'api_token'))
          print(f'GET /me status: {resp.status_code}')
          print(f'GET /me body: {resp.text[:200]}')
          "

      - name: Run integration tests
        if: env.TOGGL_API_TOKEN != ''
        env:
          TOGGL_API_TOKEN: ${{ secrets.TOGGL_API_TOKEN }}
          TOGGL_API_URL: ${{ secrets.TOGGL_API_URL }}
          TOGGL_REPORTS_URL: ${{ secrets.TOGGL_REPORTS_URL }}
        run: |
          pytest tests/integration/ --cov toggl --cov-append
